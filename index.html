<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍅 番茄混淆 · 一键屠版</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 12px;
            font-family: system-ui, sans-serif;
            background: #1a1a2e;
            color: #eee;
        }
        h1 { font-size: 1.8rem; text-align: center; color: #ff6b6b; }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin: 16px 0;
        }
        .btn {
            background: #0f3460;
            border: none;
            color: white;
            padding: 12px 16px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            cursor: pointer;
            flex: 1 0 120px;
            text-align: center;
        }
        .btn-primary { background: #e94560; }
        .btn-success { background: #0f9b8e; }
        .btn-warning { background: #f77f00; }
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        .file-input-wrapper input {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }
        .card {
            background: #1e2a47;
            border-radius: 16px;
            padding: 8px;
            display: flex;
            flex-direction: column;
        }
        .card-img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 12px;
            background: #2c3e50;
        }
        .card-name {
            font-size: 0.7rem;
            margin: 5px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-status {
            font-size: 0.7rem;
            background: #533483;
            padding: 2px 8px;
            border-radius: 20px;
            align-self: flex-start;
            margin-bottom: 5px;
        }
        .card-actions {
            display: flex;
            gap: 4px;
        }
        .card-btn {
            background: #2c3e50;
            border: none;
            color: white;
            padding: 6px 0;
            border-radius: 20px;
            font-size: 0.7rem;
            flex: 1;
            cursor: pointer;
        }
        .info-bar {
            display: flex;
            justify-content: space-between;
            background: #0b1b2f;
            padding: 8px 16px;
            border-radius: 30px;
            margin: 10px 0;
        }
        #progress { color: #f9c74f; }
        .disabled-btn { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

<h1>🍅 番茄混淆</h1>
<div style="text-align:center; font-size:0.9rem; margin-bottom:10px;">批量选图 · 一键全搞 · 单张可控</div>

<div class="btn-group">
    <div class="file-input-wrapper btn">
        📁 选图片
        <input type="file" id="imageInput" accept="image/*" multiple>
    </div>
    <button class="btn btn-warning" id="clearBtn">🗑️ 清空</button>
</div>

<div class="btn-group">
    <button class="btn btn-primary" id="batchEncryptBtn">🔒 全部混淆</button>
    <button class="btn btn-success" id="batchDecryptBtn">🔓 全部解混</button>
    <button class="btn" id="downloadAllConfusedBtn" style="background:#3a5a78;">⬇️ 下载已混淆</button>
</div>

<div class="info-bar">
    <span id="fileCount">📸 0 张</span>
    <span id="progress"></span>
</div>

<div id="gallery" class="gallery"></div>
<div style="margin-top:15px; font-size:0.8rem; text-align:center; color:#aaa;">
    点击卡片按钮单独操作，或使用顶部一键批量
</div>

<script>
// ---------- 希尔伯特曲线 (不改) ----------
function gilbert2d(w, h) {
    const coords = [];
    if (w >= h) generate2d(0, 0, w, 0, 0, h, coords);
    else generate2d(0, 0, 0, h, w, 0, coords);
    return coords;
}
function generate2d(x, y, ax, ay, bx, by, arr) {
    const w = Math.abs(ax + ay), h = Math.abs(bx + by);
    const dax = Math.sign(ax), day = Math.sign(ay);
    const dbx = Math.sign(bx), dby = Math.sign(by);
    if (h === 1) {
        for (let i = 0; i < w; i++) { arr.push([x, y]); x += dax; y += day; }
        return;
    }
    if (w === 1) {
        for (let i = 0; i < h; i++) { arr.push([x, y]); x += dbx; y += dby; }
        return;
    }
    let ax2 = Math.floor(ax/2), ay2 = Math.floor(ay/2);
    let bx2 = Math.floor(bx/2), by2 = Math.floor(by/2);
    const w2 = Math.abs(ax2+ay2), h2 = Math.abs(bx2+by2);
    if (2*w > 3*h) {
        if ((w2%2) && w>2) { ax2 += dax; ay2 += day; }
        generate2d(x, y, ax2, ay2, bx, by, arr);
        generate2d(x+ax2, y+ay2, ax-ax2, ay-ay2, bx, by, arr);
    } else {
        if ((h2%2) && h>2) { bx2 += dbx; by2 += dby; }
        generate2d(x, y, bx2, by2, ax2, ay2, arr);
        generate2d(x+bx2, y+by2, ax, ay, bx-bx2, by-by2, arr);
        generate2d(x+(ax-dax)+(bx2-dbx), y+(ay-day)+(by2-dby), -bx2, -by2, -(ax-ax2), -(ay-ay2), arr);
    }
}

// ---------- 全局状态 ----------
const imageMap = new Map(); // id -> { fileBlob, name, currentBlob, status, imgElement, cardElements }
let nextId = 0;
const gallery = document.getElementById('gallery');
const fileCountSpan = document.getElementById('fileCount');
const progressSpan = document.getElementById('progress');
let isProcessingBatch = false; // 防止重复点击批量

function updateCount() {
    fileCountSpan.textContent = `📸 ${imageMap.size} 张`;
}

// 创建卡片
function createCard(id, name, blob) {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = id;

    const img = document.createElement('img');
    img.className = 'card-img';
    img.src = URL.createObjectURL(blob);
    img.alt = name;

    const nameDiv = document.createElement('div');
    nameDiv.className = 'card-name';
    nameDiv.textContent = name;

    const statusSpan = document.createElement('span');
    statusSpan.className = 'card-status';
    statusSpan.textContent = '原始';

    const actions = document.createElement('div');
    actions.className = 'card-actions';
    
    const confuseBtn = document.createElement('button');
    confuseBtn.className = 'card-btn';
    confuseBtn.textContent = '🔒混淆';
    confuseBtn.onclick = () => processSingleImage(id, true);
    
    const deconfuseBtn = document.createElement('button');
    deconfuseBtn.className = 'card-btn';
    deconfuseBtn.textContent = '🔓解混';
    deconfuseBtn.onclick = () => processSingleImage(id, false);
    
    const downloadBtn = document.createElement('button');
    downloadBtn.className = 'card-btn';
    downloadBtn.textContent = '⬇️下载';
    downloadBtn.onclick = () => {
        const entry = imageMap.get(id);
        const url = URL.createObjectURL(entry.currentBlob);
        const a = document.createElement('a');
        a.href = url;
        a.download = entry.name.replace(/\.\w+$/,'') + (entry.status==='confused'?'_confused':'') + '.jpg';
        a.click();
        URL.revokeObjectURL(url);
    };

    actions.appendChild(confuseBtn);
    actions.appendChild(deconfuseBtn);
    actions.appendChild(downloadBtn);
    
    card.appendChild(img);
    card.appendChild(nameDiv);
    card.appendChild(statusSpan);
    card.appendChild(actions);

    return { card, img, statusSpan, confuseBtn, deconfuseBtn };
}

// 单张图片处理核心 (供单独按钮和批量调用)
async function processSingleImage(id, isEncrypt) {
    const entry = imageMap.get(id);
    if (!entry) return;
    const { cardElements } = entry;
    
    // 防连点：禁用卡片内按钮
    cardElements.confuseBtn.disabled = true;
    cardElements.deconfuseBtn.disabled = true;
    cardElements.statusSpan.textContent = isEncrypt ? '混淆中...' : '还原中...';
    
    try {
        const imgBitmap = await createImageBitmap(entry.currentBlob);
        const width = imgBitmap.width, height = imgBitmap.height;
        const canvas = new OffscreenCanvas(width, height);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(imgBitmap, 0, 0);
        imgBitmap.close();
        
        const imgData = ctx.getImageData(0, 0, width, height);
        const newData = new ImageData(width, height);
        const curve = gilbert2d(width, height);
        const offset = Math.round((Math.sqrt(5) - 1) / 2 * width * height);
        
        for (let i = 0; i < width * height; i++) {
            const oldPos = curve[i];
            const newPos = curve[(i + offset) % (width * height)];
            const oldP = 4 * (oldPos[0] + oldPos[1] * width);
            const newP = 4 * (newPos[0] + newPos[1] * width);
            if (isEncrypt) {
                newData.data.set(imgData.data.slice(oldP, oldP+4), newP);
            } else {
                newData.data.set(imgData.data.slice(newP, newP+4), oldP);
            }
        }
        ctx.putImageData(newData, 0, 0);
        
        const outBlob = await canvas.convertToBlob({ type: 'image/jpeg', quality: 1.0 });
        
        entry.currentBlob = outBlob;
        entry.status = isEncrypt ? 'confused' : 'restored';
        cardElements.img.src = URL.createObjectURL(outBlob);
        cardElements.statusSpan.textContent = isEncrypt ? '已混淆' : '已还原';
        cardElements.statusSpan.style.background = isEncrypt ? '#e94560' : '#0f9b8e';
        
        return true;
    } catch (e) {
        console.error(e);
        cardElements.statusSpan.textContent = '失败';
        return false;
    } finally {
        cardElements.confuseBtn.disabled = false;
        cardElements.deconfuseBtn.disabled = false;
    }
}

// 批量处理 (带延迟)
async function batchProcess(isEncrypt) {
    if (isProcessingBatch) return;
    if (imageMap.size === 0) {
        alert('没图你处理个毛');
        return;
    }
    
    isProcessingBatch = true;
    const entries = Array.from(imageMap.entries());
    const total = entries.length;
    let completed = 0;
    const actionName = isEncrypt ? '混淆' : '解混淆';
    
    // 禁用全局批量按钮
    document.getElementById('batchEncryptBtn').disabled = true;
    document.getElementById('batchDecryptBtn').disabled = true;
    
    progressSpan.textContent = `⏳ ${actionName} 0/${total}`;
    
    for (const [id, entry] of entries) {
        const success = await processSingleImage(id, isEncrypt);
        completed++;
        progressSpan.textContent = `⏳ ${actionName} ${completed}/${total}`;
        // 延迟80ms让手机喘气，也防止界面卡死
        await new Promise(r => setTimeout(r, 80));
    }
    
    progressSpan.textContent = `✅ ${actionName}完成 ${completed} 张`;
    isProcessingBatch = false;
    document.getElementById('batchEncryptBtn').disabled = false;
    document.getElementById('batchDecryptBtn').disabled = false;
    setTimeout(() => progressSpan.textContent = '', 2000);
}

// 添加图片
async function addImages(files) {
    let added = 0;
    for (const file of files) {
        if (!file.type.startsWith('image/')) continue;
        try {
            const id = nextId++;
            const name = file.name || 'image.jpg';
            const blob = file;
            
            const { card, img, statusSpan, confuseBtn, deconfuseBtn } = createCard(id, name, blob);
            
            const imgEl = new Image();
            await new Promise((resolve, reject) => {
                imgEl.onload = resolve;
                imgEl.onerror = reject;
                imgEl.src = URL.createObjectURL(blob);
            });
            
            imageMap.set(id, {
                fileBlob: blob,
                name,
                currentBlob: blob,
                status: 'original',
                imgElement: imgEl,
                cardElements: { card, img, statusSpan, confuseBtn, deconfuseBtn }
            });
            gallery.appendChild(card);
            added++;
        } catch (e) {
            console.warn('跳过无效图片', file.name, e);
        }
    }
    updateCount();
    if (added) {
        progressSpan.textContent = `添加 ${added} 张`;
        setTimeout(() => progressSpan.textContent = '', 1000);
    }
}

// 下载所有已混淆
function downloadAllConfused() {
    const confusedEntries = Array.from(imageMap.values()).filter(e => e.status === 'confused');
    if (confusedEntries.length === 0) {
        alert('没有已混淆的图片');
        return;
    }
    progressSpan.textContent = `准备下载 ${confusedEntries.length} 张...`;
    
    let count = 0;
    for (const entry of confusedEntries) {
        setTimeout(() => {
            const url = URL.createObjectURL(entry.currentBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = entry.name.replace(/\.\w+$/, '') + '_confused.jpg';
            a.click();
            URL.revokeObjectURL(url);
            count++;
            if (count === confusedEntries.length) {
                progressSpan.textContent = `已触发 ${count} 个下载`;
                setTimeout(() => progressSpan.textContent = '', 1500);
            }
        }, count * 300);
    }
}

// 清空
function clearAll() {
    imageMap.clear();
    gallery.innerHTML = '';
    updateCount();
    progressSpan.textContent = '已清空';
    setTimeout(() => progressSpan.textContent = '', 1000);
}

// ---------- 事件绑定 ----------
document.getElementById('imageInput').addEventListener('change', (e) => {
    const files = Array.from(e.target.files);
    if (files.length) {
        addImages(files);
        e.target.value = '';
    }
});

document.getElementById('clearBtn').addEventListener('click', clearAll);
document.getElementById('batchEncryptBtn').addEventListener('click', () => batchProcess(true));
document.getElementById('batchDecryptBtn').addEventListener('click', () => batchProcess(false));
document.getElementById('downloadAllConfusedBtn').addEventListener('click', downloadAllConfused);

updateCount();
</script>
</body>
</html>
